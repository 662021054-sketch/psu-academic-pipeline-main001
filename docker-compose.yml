

services:
  pipeline:
    build: .
    container_name: psu_pipeline
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./logs:/app/logs
    depends_on:
      - postgres
    restart: unless-stopped
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=psu_academic
      - DB_USER=admin
      - DB_PASSWORD=psu2024
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PYTHONIOENCODING=utf-8
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8

  postgres:
    image: postgres:15
    container_name: psu_postgres
    environment:
      POSTGRES_DB: psu_academic
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: psu2024
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: psu_admin
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./logs:/app/logs
    depends_on:
      - postgres
    ports:
      - "8501:8501"
    restart: unless-stopped
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=psu_academic
      - DB_USER=admin
      - DB_PASSWORD=psu2024
      - GROQ_API_KEY=${GROQ_API_KEY}

volumes:
  pgdata: